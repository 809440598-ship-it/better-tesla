<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080b0f" />
    <title>Mac mini - Better Tesla</title>
    <link rel="stylesheet" href="/styles.css?v=clean-1" />
    <style>
      body {
        background: #eef3f7;
      }

      .remote-shell {
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .remote-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 68px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      .remote-title {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .remote-title h1 {
        font-size: 24px;
        font-weight: 900;
        line-height: 1;
      }

      .remote-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .remote-controls input {
        width: 210px;
        min-height: 46px;
      }

      .remote-controls select {
        width: 126px;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        color: var(--text);
        padding: 0 12px;
        font: inherit;
        font-weight: 800;
      }

      .remote-stage {
        position: relative;
        overflow: hidden;
        background: #0f172a;
      }

      #screen {
        width: 100%;
        height: 100%;
      }

      .remote-message {
        position: absolute;
        inset: auto 16px 16px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.9);
        color: #334155;
        font-size: 12px;
        font-weight: 800;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      }

      @media (max-width: 760px) {
        .remote-bar {
          align-items: stretch;
          flex-direction: column;
        }

        .remote-controls,
        .remote-controls input,
        .remote-controls select,
        .remote-controls button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="remote-shell">
      <header class="remote-bar">
        <div class="remote-title">
          <a class="icon-button" href="/" aria-label="Back" title="Back" data-i18n-aria="back" data-i18n-title="back">‹</a>
          <div>
            <p class="eyebrow" data-i18n="remoteDesktop">Remote Desktop</p>
            <h1>Mac mini</h1>
          </div>
        </div>
        <div class="remote-controls">
          <input id="password" type="password" autocomplete="off" placeholder="VNC password" data-i18n-placeholder="vncPassword" />
          <input id="username" autocomplete="username" placeholder="Username" data-i18n-placeholder="username" />
          <select id="profile" aria-label="Quality profile" title="Quality profile" data-i18n-aria="qualityProfile" data-i18n-title="qualityProfile">
            <option value="speed" data-i18n="speed">Speed</option>
            <option value="balanced" data-i18n="balanced">Balanced</option>
            <option value="sharp" data-i18n="sharp">Sharp</option>
          </select>
          <button class="action-button" id="connect" data-i18n="connect">Connect</button>
          <button class="action-button ghost" id="status" data-i18n="status">Status</button>
        </div>
      </header>
      <section class="remote-stage">
        <div id="screen"></div>
        <div class="remote-message" id="message" data-i18n="startHint">Start Mac Screen Sharing and tunnel, then connect.</div>
      </section>
    </main>

    <script type="module">
      import RFB from "/vendor/novnc/core/rfb.js";

      const screen = document.querySelector("#screen");
      const message = document.querySelector("#message");
      const password = document.querySelector("#password");
      const username = document.querySelector("#username");
      const profile = document.querySelector("#profile");
      const connect = document.querySelector("#connect");
      const status = document.querySelector("#status");
      let rfb;
      let connectTimer;

      const settings = JSON.parse(localStorage.getItem("betterTesla.settings") || "{}");
      const normalizeLanguage = (value) => (value === "zh" || value === "en" ? value : null);
      const language = normalizeLanguage(settings.language) || (navigator.language?.toLowerCase().startsWith("zh") ? "zh" : "en");
      const copy = {
        en: {
          pageTitle: "Mac mini - Better Tesla",
          back: "Back",
          remoteDesktop: "Remote Desktop",
          vncPassword: "VNC password",
          username: "Username",
          qualityProfile: "Quality profile",
          speed: "Speed",
          balanced: "Balanced",
          sharp: "Sharp",
          connect: "Connect",
          status: "Status",
          startHint: "Start Mac Screen Sharing and tunnel, then connect.",
          tunnelReady: "Tunnel ready",
          connecting: "Connecting...",
          connected: "Connected",
          disconnected: "Disconnected",
          sendingCredentials: "Sending VNC credentials",
          withUsername: " with username",
          passwordRequired: "VNC password required",
          authFailed: "VNC authentication failed",
          stillWaiting: "Still waiting for macOS Screen Sharing. Check username/password or VNC access setting."
        },
        zh: {
          pageTitle: "Mac mini - Better Tesla",
          back: "返回",
          remoteDesktop: "远程桌面",
          vncPassword: "VNC 密码",
          username: "用户名",
          qualityProfile: "画质模式",
          speed: "速度",
          balanced: "均衡",
          sharp: "清晰",
          connect: "连接",
          status: "状态",
          startHint: "开启 Mac 屏幕共享和隧道后再连接。",
          tunnelReady: "隧道就绪",
          connecting: "连接中...",
          connected: "已连接",
          disconnected: "已断开",
          sendingCredentials: "正在发送 VNC 凭据",
          withUsername: "（含用户名）",
          passwordRequired: "需要 VNC 密码",
          authFailed: "VNC 认证失败",
          stillWaiting: "仍在等待 macOS 屏幕共享，请检查用户名/密码或 VNC 访问设置。"
        }
      };
      const t = (key) => copy[language]?.[key] || copy.en[key] || key;
      const applyLanguage = () => {
        document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
        document.title = t("pageTitle");
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          node.placeholder = t(node.dataset.i18nPlaceholder);
        });
        document.querySelectorAll("[data-i18n-aria]").forEach((node) => {
          node.setAttribute("aria-label", t(node.dataset.i18nAria));
        });
        document.querySelectorAll("[data-i18n-title]").forEach((node) => {
          node.title = t(node.dataset.i18nTitle);
        });
      };
      applyLanguage();

      password.value = settings.vncPassword || localStorage.getItem("betterTesla.vncPassword") || "";
      username.value = settings.macUsername || localStorage.getItem("betterTesla.macUsername") || "";
      profile.value = localStorage.getItem("betterTesla.macProfile") || "speed";

      const profiles = {
        speed: { qualityLevel: 2, compressionLevel: 9, labelKey: "speed" },
        balanced: { qualityLevel: 5, compressionLevel: 7, labelKey: "balanced" },
        sharp: { qualityLevel: 8, compressionLevel: 4, labelKey: "sharp" }
      };

      const setMessage = (text) => {
        message.textContent = text;
      };

      const checkStatus = async () => {
        try {
          const res = await fetch("/api/mac/status");
          const payload = await res.json();
          setMessage(payload.ok ? `${t("tunnelReady")}: ${payload.target}` : `${payload.hint}: ${payload.error}`);
        } catch (error) {
          setMessage(error.message);
        }
      };

      const connectMac = () => {
        localStorage.setItem("betterTesla.vncPassword", password.value);
        localStorage.setItem("betterTesla.macUsername", username.value);
        localStorage.setItem("betterTesla.macProfile", profile.value);
        if (rfb) rfb.disconnect();
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const credentials = { password: password.value };
        if (username.value) credentials.username = username.value;
        rfb = new RFB(screen, `${protocol}//${location.host}/mac/ws`, {
          credentials
        });
        rfb.scaleViewport = true;
        rfb.qualityLevel = profiles[profile.value].qualityLevel;
        rfb.compressionLevel = profiles[profile.value].compressionLevel;
        rfb.resizeSession = false;
        rfb.clipViewport = true;
        rfb.showDotCursor = true;
        rfb.addEventListener("connect", () => {
          clearTimeout(connectTimer);
          setMessage(`${t("connected")} (${t(profiles[profile.value].labelKey)})`);
        });
        rfb.addEventListener("disconnect", () => {
          clearTimeout(connectTimer);
          setMessage(t("disconnected"));
        });
        rfb.addEventListener("credentialsrequired", () => {
          const currentPassword = password.value || localStorage.getItem("betterTesla.vncPassword") || "";
          const currentUsername = username.value || localStorage.getItem("betterTesla.macUsername") || "";
          if (currentPassword) {
            const nextCredentials = { password: currentPassword };
            if (currentUsername) nextCredentials.username = currentUsername;
            rfb.sendCredentials(nextCredentials);
            setMessage(`${t("sendingCredentials")}${currentUsername ? t("withUsername") : ""}...`);
            return;
          }
          setMessage(t("passwordRequired"));
        });
        rfb.addEventListener("securityfailure", (event) => {
          clearTimeout(connectTimer);
          setMessage(`${t("authFailed")}${event.detail?.reason ? `: ${event.detail.reason}` : ""}`);
        });
        setMessage(t("connecting"));
        connectTimer = setTimeout(() => {
          setMessage(t("stillWaiting"));
        }, 9000);
      };

      connect.addEventListener("click", connectMac);
      status.addEventListener("click", checkStatus);
      checkStatus();
    </script>
  </body>
</html>
