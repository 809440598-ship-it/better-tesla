<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080b0f" />
    <title>Mac mini - Better Tesla</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        background: #080b0f;
      }

      .remote-shell {
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .remote-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 64px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(12, 16, 22, 0.96);
      }

      .remote-title {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .remote-title h1 {
        font-size: 22px;
      }

      .remote-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .remote-controls input {
        width: 220px;
        min-height: 44px;
      }

      .remote-controls select {
        width: 130px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 0 12px;
        font: inherit;
        font-weight: 800;
      }

      .remote-stage {
        position: relative;
        overflow: hidden;
        background: #020305;
      }

      #screen {
        width: 100%;
        height: 100%;
      }

      .remote-message {
        position: absolute;
        inset: auto 18px 18px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(12, 16, 22, 0.88);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        .remote-bar {
          align-items: stretch;
          flex-direction: column;
        }

        .remote-controls,
        .remote-controls input,
        .remote-controls select,
        .remote-controls button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="remote-shell">
      <header class="remote-bar">
        <div class="remote-title">
          <a class="icon-button" href="/" aria-label="Back" title="Back">‹</a>
          <div>
            <p class="eyebrow">Remote Desktop</p>
            <h1>Mac mini</h1>
          </div>
        </div>
        <div class="remote-controls">
          <input id="password" type="password" autocomplete="off" placeholder="VNC password" />
          <input id="username" autocomplete="username" placeholder="Username" />
          <select id="profile" aria-label="Quality profile" title="Quality profile">
            <option value="speed">Speed</option>
            <option value="balanced">Balanced</option>
            <option value="sharp">Sharp</option>
          </select>
          <button class="action-button" id="connect">Connect</button>
          <button class="action-button ghost" id="status">Status</button>
        </div>
      </header>
      <section class="remote-stage">
        <div id="screen"></div>
        <div class="remote-message" id="message">Start Mac Screen Sharing and tunnel, then connect.</div>
      </section>
    </main>

    <script type="module">
      import RFB from "/vendor/novnc/core/rfb.js";

      const screen = document.querySelector("#screen");
      const message = document.querySelector("#message");
      const password = document.querySelector("#password");
      const username = document.querySelector("#username");
      const profile = document.querySelector("#profile");
      const connect = document.querySelector("#connect");
      const status = document.querySelector("#status");
      let rfb;
      let connectTimer;

      const settings = JSON.parse(localStorage.getItem("betterTesla.settings") || "{}");
      password.value = settings.vncPassword || localStorage.getItem("betterTesla.vncPassword") || "";
      username.value = settings.macUsername || localStorage.getItem("betterTesla.macUsername") || "";
      profile.value = localStorage.getItem("betterTesla.macProfile") || "speed";

      const profiles = {
        speed: { qualityLevel: 2, compressionLevel: 9, label: "Speed" },
        balanced: { qualityLevel: 5, compressionLevel: 7, label: "Balanced" },
        sharp: { qualityLevel: 8, compressionLevel: 4, label: "Sharp" }
      };

      const setMessage = (text) => {
        message.textContent = text;
      };

      const checkStatus = async () => {
        try {
          const res = await fetch("/api/mac/status");
          const payload = await res.json();
          setMessage(payload.ok ? `Tunnel ready: ${payload.target}` : `${payload.hint}: ${payload.error}`);
        } catch (error) {
          setMessage(error.message);
        }
      };

      const connectMac = () => {
        localStorage.setItem("betterTesla.vncPassword", password.value);
        localStorage.setItem("betterTesla.macUsername", username.value);
        localStorage.setItem("betterTesla.macProfile", profile.value);
        if (rfb) rfb.disconnect();
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const credentials = { password: password.value };
        if (username.value) credentials.username = username.value;
        rfb = new RFB(screen, `${protocol}//${location.host}/mac/ws`, {
          credentials
        });
        rfb.scaleViewport = true;
        rfb.qualityLevel = profiles[profile.value].qualityLevel;
        rfb.compressionLevel = profiles[profile.value].compressionLevel;
        rfb.resizeSession = false;
        rfb.clipViewport = true;
        rfb.showDotCursor = true;
        rfb.addEventListener("connect", () => {
          clearTimeout(connectTimer);
          setMessage(`Connected (${profiles[profile.value].label})`);
        });
        rfb.addEventListener("disconnect", () => {
          clearTimeout(connectTimer);
          setMessage("Disconnected");
        });
        rfb.addEventListener("credentialsrequired", () => {
          const currentPassword = password.value || localStorage.getItem("betterTesla.vncPassword") || "";
          const currentUsername = username.value || localStorage.getItem("betterTesla.macUsername") || "";
          if (currentPassword) {
            const nextCredentials = { password: currentPassword };
            if (currentUsername) nextCredentials.username = currentUsername;
            rfb.sendCredentials(nextCredentials);
            setMessage(`Sending VNC credentials${currentUsername ? " with username" : ""}...`);
            return;
          }
          setMessage("VNC password required");
        });
        rfb.addEventListener("securityfailure", (event) => {
          clearTimeout(connectTimer);
          setMessage(`VNC authentication failed${event.detail?.reason ? `: ${event.detail.reason}` : ""}`);
        });
        setMessage("Connecting...");
        connectTimer = setTimeout(() => {
          setMessage("Still waiting for macOS Screen Sharing. Check username/password or VNC access setting.");
        }, 9000);
      };

      connect.addEventListener("click", connectMac);
      status.addEventListener("click", checkStatus);
      checkStatus();
    </script>
  </body>
</html>
