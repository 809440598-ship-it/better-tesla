<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eef3f7" />
    <title>Better Tesla</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css?v=clean-1" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Status" data-i18n-aria="status">
        <div>
          <p class="eyebrow" data-i18n="driveConsole">Drive Console</p>
          <h1>Better Tesla</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="refreshButton" aria-label="Refresh status" title="Refresh status" data-i18n-aria="refreshStatus" data-i18n-title="refreshStatus">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="icon-button" id="settingsButton" aria-label="Settings" title="Settings" data-i18n-aria="settings" data-i18n-title="settings">
            <span aria-hidden="true">⚙</span>
          </button>
          <time id="clock">--:--</time>
        </div>
      </section>

      <section class="home-layout">
        <article class="hero-card liquid-card">
          <div class="status-head hero-head">
            <div>
              <p class="eyebrow" data-i18n="teslaAccount">Tesla Account</p>
              <h2 id="authTitle" data-i18n="checking">Checking</h2>
              <p class="muted-line" id="authMeta">--</p>
            </div>
            <div class="hero-actions">
              <button class="action-button" id="loginButton" data-i18n="connectTesla">Connect Tesla</button>
              <button class="action-button ghost" id="logoutButton" data-i18n="logout">Logout</button>
              <a class="action-button ghost text-link" href="/data.html" data-i18n="details">Details</a>
            </div>
          </div>

          <div class="vehicle-hero">
            <div>
              <p class="eyebrow" data-i18n="vehicle">Vehicle</p>
              <h2 id="vehicleName">--</h2>
            </div>
            <span class="status-pill" id="vehicleState">--</span>
          </div>

          <div class="home-metrics" aria-label="Tesla metrics">
            <article>
              <span data-i18n="soc">SOC</span>
              <strong id="socValue">--</strong>
              <small id="rangeValue">--</small>
            </article>
            <article>
              <span data-i18n="odometer">Odometer</span>
              <strong id="odometerValue">--</strong>
              <small id="locationValue">--</small>
            </article>
            <article>
              <span data-i18n="dataSource">Data Source</span>
              <strong id="sourceValue">--</strong>
              <small id="updatedAt">--</small>
            </article>
          </div>
        </article>

        <aside class="quick-panel liquid-card">
          <div class="status-head">
            <div>
              <p class="eyebrow" data-i18n="quickAccess">Quick Access</p>
              <h2 data-i18n="services">Services</h2>
            </div>
            <span class="pulse" id="serverPulse"></span>
          </div>
          <div class="service-grid compact" id="serviceGrid" aria-label="Services" data-i18n-aria="services"></div>
          <p class="muted-line" id="serverState">--</p>
        </aside>
      </section>
    </main>

    <dialog class="modal" id="settingsModal">
      <form method="dialog" class="modal-body">
        <div class="modal-head">
          <h2 data-i18n="settings">Settings</h2>
          <button class="icon-button" value="close" aria-label="Close" title="Close" data-i18n-aria="close" data-i18n-title="close">×</button>
        </div>
        <label>
          <span data-i18n="language">Language</span>
          <select id="languageSelect">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <label>
          <span data-i18n="macMiniUrl">Mac mini URL</span>
          <input id="macUrl" inputmode="url" autocomplete="off" placeholder="https://mac.example.com" />
        </label>
        <label>
          <span data-i18n="macVncPassword">Mac VNC Password</span>
          <input id="vncPassword" type="password" autocomplete="off" placeholder="Local browser only" data-i18n-placeholder="localBrowserOnly" />
        </label>
        <label>
          <span data-i18n="macUsername">Mac Username</span>
          <input id="macUsername" autocomplete="username" placeholder="Optional" data-i18n-placeholder="optional" />
        </label>
        <label>
          <span data-i18n="codexUrl">Codex URL</span>
          <input id="codexUrl" inputmode="url" autocomplete="off" placeholder="https://codex.example.com" />
        </label>
        <menu>
          <button class="action-button ghost" value="cancel" data-i18n="cancel">Cancel</button>
          <button class="action-button" id="saveSettings" value="default" data-i18n="save">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
